<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A minimalist maze game — tilt or use arrow keys.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Zen Maze">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Zen Maze</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background-color: #FFFFFF;
    }
    @media (prefers-color-scheme: dark) {
      html, body { background-color: #1C1C1E; }
    }
  </style>
</head>
<body>
  <script>
    async function requestMotionPermission() {
      if (typeof DeviceMotionEvent !== 'undefined'
          && typeof DeviceMotionEvent.requestPermission === 'function') {
        try {
          var result = await DeviceMotionEvent.requestPermission();
          return result === 'granted';
        } catch (e) {
          return false;
        }
      }
      return true;
    }

    var _motionX = 0, _motionY = 0, _motionZ = 0;
    var _motionStarted = false;
    function startMotionListener() {
      if (_motionStarted) return;
      _motionStarted = true;
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      var sign = isIOS ? -1 : 1;
      window.addEventListener('devicemotion', function(e) {
        var a = e.accelerationIncludingGravity;
        if (a) {
          _motionX = sign * (a.x || 0);
          _motionY = sign * (a.y || 0);
          _motionZ = sign * (a.z || 0);
        }
      });
    }
    function getMotionX() { return _motionX; }
    function getMotionY() { return _motionY; }
    function getMotionZ() { return _motionZ; }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
